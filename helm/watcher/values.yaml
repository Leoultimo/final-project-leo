# QuakeWatch Helm Chart - Default Values
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Application name
app: quakewatch

# -- Default replica count for the deployment
replicaCount: 1

# -- Environment scope (production/staging/development)
environment: production

# -- Image configuration
image:
  # -- Docker repository
  repository: leoultimo/watcher
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to chart appVersion)
  tag: latest

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override chart name
nameOverride: ""

# -- Override full chart name
fullnameOverride: ""

# -- Service account configuration
serviceAccount:
  # -- Create service account
  create: true
  # -- Automatically mount API credentials
  automount: true
  # -- ServiceAccount annotations
  annotations: {}
  # -- ServiceAccount name (auto-generated if empty)
  name: ""

# -- Pod annotations
podAnnotations: {}

# -- Pod labels
podLabels: {}

# -- Pod security context
podSecurityContext: {}

# -- Container security context
securityContext: {}

# -- Service configuration
service:
  # -- Service type (ClusterIP/NodePort/LoadBalancer)
  type: ClusterIP
  # -- Service port
  port: 80
  # -- Target container port
  targetPort: 5000
  # -- Session affinity
  sessionAffinity: None

# -- Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# -- Gateway API HTTPRoute configuration
httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - chart-example.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /headers

# -- Container port
containerPort: 5000

# -- Resource limits and requests
resources:
  limits:
    cpu: 600m
    memory: 800Mi
  requests:
    cpu: 250m
    memory: 400Mi

# -- Liveness probe configuration
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# -- Readiness probe configuration
readinessProbe:
  enabled: true
  httpGet:
    path: /ping
    port: 5000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# -- Horizontal Pod Autoscaler configuration
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  scaleDownStabilizationWindowSeconds: 300
  scaleDownPercentage: 20

# -- CronJob health check configuration
healthCheck:
  enabled: true
  # -- Schedule in cron format
  schedule: "*/5 * * * *"
  # -- Health check image
  image: curlimages/curl:latest
  # -- Health check endpoint service name
  serviceName: quakewatch-service
  # -- Successful jobs history limit
  successfulJobsHistoryLimit: 3
  # -- Failed jobs history limit
  failedJobsHistoryLimit: 3
  # -- TTL seconds after finished
  ttlSecondsAfterFinished: 100

# -- Additional volumes
volumes: []

# -- Additional volume mounts
volumeMounts: []

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}
