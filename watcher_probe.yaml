---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quakewatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quakewatch
  template:
    metadata:
      labels:
        app: quakewatch
    spec:
      containers:
      - name: quakewatch
        image: leoultimo/watcher:latest
        ports:
        - containerPort: 5000
        env:
        - name: ENVIRONMENT
          value: "production"
        resources:
          requests:
            memory: "400Mi"
            cpu: "250m"
          limits:
            memory: "800Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ping
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: quakewatch-service
spec:
  type: ClusterIP
  selector:
    app: quakewatch
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
---    
apiVersion: v1
kind: Service
metadata:
  name: quakewatch-service
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: quakewatch
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
  sessionAffinity: None
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: quakewatch-health-check
  namespace: default
spec:
  schedule: "*/5 * * * *"  # Every 5 minutes
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 100
      template:
        spec:
          containers:
          - name: health-checker
            image: curlimages/curl:latest
            command:
            - /bin/sh
            - -c 
            - |
              echo "Starting health check at $(date)"
              
              # Check if service is reachable
              if curl -f -s -o /dev/null -w "%{http_code}" http://quakewatch-service | grep -q "200"; then
                echo "✓ Health check passed - Service is UP"
                exit 0
              else
                echo "✗ Health check failed - Service is DOWN"
                exit 1
              fi
          restartPolicy: OnFailure    
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quakewatch-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quakewatch
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 20
        periodSeconds: 60
        