{{- /*
  QuakeWatch Service Template
  Exposes the deployment to other pods and configure ingress access.
*/ -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app }}-service
  labels:
    {{- include "watcher.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  sessionAffinity: {{ .Values.service.sessionAffinity }}
  selector:
    {{- include "watcher.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http